<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CoxyInsure Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#F5F7FA;
      --card:#FFFFFF;
      --line:#E4E7EC;
      --text:#1A1F36;
      --muted:#6B7280;
      --primary:#0052FF;
      --primary-2:#0040CC;
      --danger:#DC2626;
      --shadow:0 1px 3px rgba(0,0,0,0.05), 0 20px 40px -12px rgba(0,0,0,0.05);
      --radius:20px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      background:var(--bg);
      font-family:'Inter',sans-serif;
      color:var(--text);
    }
    .card{
      width:min(440px, calc(100vw - 32px));
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:32px;
    }
    .brand{
      font-size:28px;
      font-weight:800;
      margin-bottom:8px;
      background:linear-gradient(135deg,#0052FF,#00B2FF);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .sub{
      margin:0 0 24px;
      color:var(--muted);
      font-size:14px;
    }
    label{
      display:block;
      font-size:13px;
      font-weight:600;
      margin:0 0 8px;
    }
    input{
      width:100%;
      height:48px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:0 14px;
      font-size:15px;
      margin-bottom:16px;
      outline:none;
    }
    input:focus{border-color:var(--primary)}
    button{
      width:100%;
      height:48px;
      border:none;
      border-radius:999px;
      background:var(--primary);
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    button:hover{background:var(--primary-2)}
    .error{
      margin-top:14px;
      color:var(--danger);
      font-size:14px;
      min-height:20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">CoxyInsure Admin</div>
    <p class="sub">Sign in to access the protocol control dashboard.</p>

    <form id="adminLoginForm">
      <label for="email">Admin Email</label>
      <input id="email" type="email" required placeholder="admin@insurance.com" />

      <label for="password">Password</label>
      <input id="password" type="password" required placeholder="Enter password" />

      <button type="submit">Sign In</button>
    </form>

    <div id="errorBox" class="error"></div>
  </div>

  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = '';

      const payload = {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      };

      try {
        const res = await fetch('admin_login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || 'Login failed.');
        }

        window.location.href = 'admin-dashboard.php';
      } catch (err) {
        errorBox.textContent = err.message || 'Login failed.';
      }
    });
  </script>
</body>
</html>
